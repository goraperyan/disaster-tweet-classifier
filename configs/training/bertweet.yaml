validation_fold: 0

batch_size: 8
num_workers: 0
max_epochs: 2
learning_rate: 0.00002
weight_decay: 0.01
warmup_ratio: 0.1

accelerator: auto
devices: 1
precision: 32
gradient_clip_val: 1.0
accumulate_grad_batches: 1
log_every_n_steps: 10

early_stopping:
  monitor: val/f1
  mode: max
  patience: 1

checkpoint:
  monitor: val/f1
  mode: max
  save_top_k: 1
  filename: bertweet-{epoch:02d}-{val_f1:.4f}

outputs:
  checkpoints_dir: artifacts/models/bertweet/checkpoints
  metrics_path: artifacts/models/bertweet/metrics.json

mlflow:
  tracking_uri: mlruns
  experiment_name: disaster_tweet_classifier
  run_name: bertweet_lightning
